services:
  shell-runner:
    image: ubuntu:24.04
    container_name: grid-shell-runner
    init: true
    restart: unless-stopped
    # Keeps the container running indefinitely so agents can `docker exec` into it
    command: tail -f /dev/null
    networks:
      - grid_runner_net
    volumes:
      - ./workspace:/workspace
    # Drop all privileges to reduce blast radius
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Limits for runaway scripts
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

networks:
  grid_runner_net:
    driver: bridge
    # False allows egress to internet (curl, git clone), but explicit mapping prevents ingress
    internal: false 
