services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: grid-external-n8n
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Berlin}
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-grid}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - WEBHOOK_URL=https://${N8N_HOST}/
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - grid_external_net

networks:
  grid_external_net:
    external: true

volumes:
  n8n_data:
