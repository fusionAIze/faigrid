name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Bash Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make executable
        run: chmod +x tests/test_workbench.sh
      - name: Run Tests
        run: ./tests/test_workbench.sh
